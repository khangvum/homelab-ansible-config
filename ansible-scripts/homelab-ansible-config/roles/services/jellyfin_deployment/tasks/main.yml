---
- name: Linux Variables Load
  ansible.builtin.include_vars:
    file: ../../../variables/os_var/linux_var.yml

- name: CIFS (Common Internet File System) Utilities Installation
  ansible.builtin.apt:
    name: cifs-utils

- name: Mount Point Directory Creation
  ansible.builtin.file:
    name: "{{ media_mount_dir }}"
    state: directory

- name: NAS Credentials File Creation
  ansible.builtin.template:
    src: cifs_credentials.j2
    dest: /etc/cifs_credentials
    owner: root
    group: root
    mode: '0600'

- name: Permanent Mount Configuration
  ansible.posix.mount:
    src: "{{ media_path }}"
    path: "{{ media_mount_dir }}"
    fstype: cifs
    opts: "credentials=/etc/cifs_credentials,uid={{ administrator_uid }},gid={{ administrator_gid }},file_mode=0775,dir_mode=0775,iocharset=utf8,vers=3.0,nofail"
    state: mounted
  register: permanent_mount

- name: Reload to Apply Changes
  ansible.builtin.systemd_service:
    daemon_reload: true
  when: permanent_mount.changed

- name: Mount Execution
  ansible.builtin.command:
    cmd: mount -a
  when: permanent_mount.changed

- name: Jellyfin Directory Creation
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0755'
  loop:
    - "{{ jellyfin_parent_dir }}"
    - "{{ jellyfin_parent_dir }}/config"
    - "{{ jellyfin_parent_dir }}/cache"

- name: Docker Compose File Creation
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ jellyfin_parent_dir }}/docker-compose.yml"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0644'
  register: docker_compose_file

- name: Jellyfin Latest Image Pull If Available
  community.docker.docker_image:
    name: jellyfin/jellyfin
    source: pull
  register: jellyfin_image_pull

- name: Jellyfin Deployment
  ansible.builtin.command:
    cmd: docker compose up -d --remove-orphans
    chdir: "{{ jellyfin_parent_dir }}"
  when: docker_compose_file.changed or jellyfin_image_pull.changed